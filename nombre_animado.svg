<svg width="680" height="120" viewBox="0 0 680 120" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Emmanuel Piñeros — Backend Developer</title>
  <desc>Animated terminal-style name card for GitHub profile README</desc>

  <rect width="680" height="120" rx="8" fill="#0d1117"/>
  <rect x="0" y="0" width="680" height="28" rx="8" fill="#161b22"/>
  <rect x="0" y="20" width="680" height="8" fill="#161b22"/>

  <circle cx="18" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="14" r="5" fill="#febc2e"/>
  <circle cx="50" cy="14" r="5" fill="#28c840"/>

  <text x="340" y="19" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#00ff4155">root@emmanuel: ~</text>

  <text x="24" y="54" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#00ff4166">└─$ cat identity.txt</text>

  <text font-family="'JetBrains Mono', 'Courier New', monospace" font-size="28" font-weight="700" fill="#00ff41" x="24" y="88">
    <tspan>E</tspan><tspan>m</tspan><tspan>m</tspan><tspan>a</tspan><tspan>n</tspan><tspan>u</tspan><tspan>e</tspan><tspan>l</tspan><tspan> </tspan><tspan>P</tspan><tspan>i</tspan><tspan>ñ</tspan><tspan>e</tspan><tspan>r</tspan><tspan>o</tspan><tspan>s</tspan>
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.1;0.15" dur="4s" fill="freeze"/>
  </text>

  <rect x="24" y="64" width="0" height="28" fill="#00ff41" rx="1">
    <animate attributeName="width" values="0;374" keyTimes="0;1" dur="1.4s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.6 1"/>
  </rect>

  <rect x="24" y="64" width="374" height="28" fill="#0d1117" rx="0">
    <animate attributeName="x" values="24;398" keyTimes="0;1" dur="1.4s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.6 1"/>
  </rect>

  <rect x="400" y="64" width="3" height="26" fill="#00ff41" rx="1">
    <animate attributeName="opacity" values="1;1;0;0;1;1;0;0;1" keyTimes="0;0.4;0.5;0.6;0.7;0.8;0.85;0.9;1" dur="1.5s" begin="1.7s" repeatCount="3"/>
    <animate attributeName="opacity" values="0" begin="6.2s" fill="freeze"/>
  </rect>

  <text x="24" y="108" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#00ff4188" opacity="0">
    &gt; Backend Developer · Bogotá, Colombia
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2s" fill="freeze"/>
  </text>
</svg>
